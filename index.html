<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😺 ¿Aylem GABY Me sigues en redesssss? 🐱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #ffffff;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #000000;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .sub {
            color: #666666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            transition: all 0.3s ease;
        }
        #btnSi {
            background: #00c853;
            color: #ffffff;
            width: 120px;
            height: 60px;
        }
        #btnSi:hover {
            transform: scale(1.05);
            background: #00e676;
        }
        #btnNo {
            background: #d50000;
            color: #ffffff;
            width: 120px;
            height: 60px;
        }
        #btnNo:hover {
            transform: scale(1.05);
            background: #ff1744;
        }
        .msj {
            color: #666666;
            margin-top: 15px;
            font-size: 16px;
            min-height: 40px;
        }
        .cont {
            color: #999999;
            font-size: 14px;
            margin-top: 5px;
        }
        .emoji {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }
        #controlMusica {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        #controlMusica:hover {
            transform: scale(1.1);
            background: rgba(0, 0, 0, 1);
        }
        /* CUADROS DE MENSAJES */
        .mensaje-cuadro {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border: 3px solid #00c853;
            border-radius: 15px;
            padding: 15px 20px;
            margin: 10px 0;
            font-size: 18px;
            color: #1b5e20;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 200, 83, 0.3);
            animation: aparecer 0.5s ease forwards;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: scale(0.5);
        }
        .mensaje-cuadro .emoji-cuadro {
            font-size: 30px;
        }
        @keyframes aparecer {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        #contenedor-mensajes {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.8s ease;
            margin-top: 10px;
        }
        #contenedor-mensajes.abierto {
            max-height: 1000px;
        }
        /* RESPONSIVE */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h2 {
                font-size: 22px;
            }
            button {
                font-size: 16px;
                padding: 12px 20px;
            }
            #btnSi,
            #btnNo {
                width: 100px;
                height: 50px;
            }
            .mensaje-cuadro {
                font-size: 15px;
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 🎵 REPRODUCTOR DE MÚSICA -->
    <audio id="musica" loop preload="auto">
        <source src="adore_-_did_i_tell_you_that_i_miss_you_(mp3.pm).mp3" type="audio/mpeg">
    </audio>
    <button id="controlMusica" onclick="toggleMusica()">🔊</button>

    <div class="container">
        <span class="emoji">😺</span>
        <h2>¿AYLEM GABY ME SIGUES EN REDES??? 🐱</h2>
        <p class="sub">"SI NO, EL GATITO SE ENOJA AJAJAJ 😾"</p>
        <button id="btnSi">SÍ 😻</button>
        <button id="btnNo">NO 🙀</button>
        <div class="msj" id="msj">🐱 LOS GATITOS QUIEREN QUE ME SIGAS ✨✨</div>
        <div class="cont" id="cont">Intentos: 0</div>
        <div id="contenedor-mensajes"></div>
    </div>

    <script>
        // 🎵 CONTROL DE MÚSICA
        let audio = document.getElementById('musica');
        let btnMusica = document.getElementById('controlMusica');
        let musicaActiva = false;

        function toggleMusica() {
            if (musicaActiva) {
                audio.pause();
                btnMusica.textContent = '🔇';
                musicaActiva = false;
            } else {
                audio.play().catch(() => {});
                btnMusica.textContent = '🔊';
                musicaActiva = true;
            }
        }

        // Intentar reproducir automáticamente
        document.addEventListener('click', function iniciarMusica() {
            if (!musicaActiva) {
                audio.play().catch(() => {});
                musicaActiva = true;
                btnMusica.textContent = '🔊';
            }
        }, { once: true });

        // También al cargar la página
        window.addEventListener('load', function() {
            audio.play().catch(() => {});
        });

        // 🎮 LÓGICA DEL JUEGO
        let btnSi = document.getElementById('btnSi');
        let btnNo = document.getElementById('btnNo');
        let msj = document.getElementById('msj');
        let cont = document.getElementById('cont');
        let contenedor = document.getElementById('contenedor-mensajes');
        let ancho = 120,
            alto = 60,
            intentos = 0;

        let memes = [
            '😺🎉 ¡SABIA QUE ACEPTARIAS!!!! 🎉😺',
            '👗✨ ME GUSTAN TUS OUTFITS 😻😻✨👗',
            '😸🌟 ERES UNA CRACK 🌟😸',
            '💬 SIEMPRE DICES COSAS INTERESANTES 💬',
            '🔥 TIENES UN ESTILO ÚNICO 🔥',
            '🌈😺 ME ENCANTA TU PERSONALIDAD 😺🌈'
        ];

        let memesNo = [
            '🙀 ES ENSERIO???',
            '😾 ME PONDRE TRISTE',
            '😿 TE FRIEGAS AJAJJA OKNO',
            '🐱 NO SIEMPRE??',
            '😺 NI EN UNA RED SOCIAL???AJJAJA'
        ];

        function mostrarMensajesEnCuadros() {
            contenedor.innerHTML = '';
            contenedor.className = 'abierto';

            // Título
            let titulo = document.createElement('div');
            titulo.className = 'mensaje-cuadro';
            titulo.style.background = 'linear-gradient(135deg,#ff6b9d,#fecfef)';
            titulo.style.borderColor = '#e94560';
            titulo.style.color = '#8b2f5a';
            titulo.style.fontSize = '22px';
            titulo.innerHTML = '🎉 ¡RESPUESTA CORRECTA! 💖🎉';
            contenedor.appendChild(titulo);

            // Mensajes
            memes.forEach((meme, index) => {
                let cuadro = document.createElement('div');
                cuadro.className = 'mensaje-cuadro';
                cuadro.style.animationDelay = (index * 0.12) + 's';
                if (index % 2 === 0) {
                    cuadro.style.background = 'linear-gradient(135deg,#e3f2fd,#bbdefb)';
                    cuadro.style.borderColor = '#1976d2';
                    cuadro.style.color = '#0d47a1';
                } else {
                    cuadro.style.background = 'linear-gradient(135deg,#fce4ec,#f8bbd0)';
                    cuadro.style.borderColor = '#c2185b';
                    cuadro.style.color = '#4a148c';
                }
                let emoji = meme.match(/[😺😻🐱😸😽🎉✨🌟🥳💖🔥🌈💕]/g);
                cuadro.innerHTML = `<span class="emoji-cuadro">${emoji ? emoji[0] : '💬'}</span> ${meme}`;
                contenedor.appendChild(cuadro);
            });

            // Final
            let final = document.createElement('div');
            final.className = 'mensaje-cuadro';
            final.style.background = 'linear-gradient(135deg,#fff3e0,#ffe0b2)';
            final.style.borderColor = '#ff9800';
            final.style.color = '#e65100';
            final.style.fontSize = '20px';
            final.innerHTML = '👗✨ ¡ME ENCANTAN TUS OUTFITS Y HABLAR CONTIGO! ✨👗';
            contenedor.appendChild(final);

            // Extra
            let extra = document.createElement('div');
            extra.className = 'mensaje-cuadro';
            extra.style.background = 'linear-gradient(135deg,#e8f5e9,#c8e6c9)';
            extra.style.borderColor = '#00c853';
            extra.style.textAlign = 'center';
            extra.style.fontSize = '35px';
            extra.style.justifyContent = 'center';
            extra.innerHTML = '🎊✨🎉💫🌟⭐🌈✨🎊';
            contenedor.appendChild(extra);
        }

        btnSi.onclick = function() {
            mostrarMensajesEnCuadros();
            ancho = 120;
            alto = 60;
            btnSi.style.width = ancho + 'px';
            btnSi.style.height = alto + 'px';
            intentos = 0;
            cont.textContent = 'Intentos: 0';
            msj.textContent = '🐱🎉 ¡GRACIAS POR ACEPTAR! 🎉😻';
            btnNo.style.position = 'static';
        };

        btnNo.onclick = function() {
            ancho += 25;
            alto += 15;
            btnSi.style.width = ancho + 'px';
            btnSi.style.height = alto + 'px';
            btnSi.textContent = 'SÍ 😻';
            intentos++;
            cont.textContent = 'Intentos: ' + intentos;
            msj.textContent = memesNo[intentos % memesNo.length] + ' 😿';
            let x = Math.random() * (window.innerWidth - 200);
            let y = Math.random() * (window.innerHeight - 200);
            btnNo.style.position = 'fixed';
            btnNo.style.left = Math.max(10, x) + 'px';
            btnNo.style.top = Math.max(10, y) + 'px';
            btnNo.style.zIndex = '1000';
        };
    </script>
</body>
</html>
